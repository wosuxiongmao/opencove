name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      dry_run:
        required: false
        type: boolean
        default: false
      tag_name:
        required: true
        type: string
      target_commitish:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build release artifacts without publishing a GitHub release
        required: false
        type: boolean
        default: false
      tag_name:
        description: Tag to release (e.g. v0.2.0 or v0.2.0-nightly.20260321.1)
        required: true
        type: string
      target_commitish:
        description: Commit-ish to tag (branch or SHA)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag_name || github.ref }}
  cancel-in-progress: false

env:
  OPENCOVE_RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
  OPENCOVE_RELEASE_TARGET: ${{ inputs.target_commitish || github.sha }}

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            runner: macos-latest
            build_command: pnpm build:mac
            artifact_name: macos
          - label: Windows
            runner: windows-latest
            build_command: pnpm build:win
            artifact_name: windows
          - label: Linux
            runner: ubuntu-latest
            build_command: pnpm build:linux
            artifact_name: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.OPENCOVE_RELEASE_TARGET }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ runner.os }}-${{ runner.arch }}-electron-${{ hashFiles('pnpm-lock.yaml', 'package.json') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align package version with release tag
        run: node scripts/apply-ci-release-version.mjs "${{ env.OPENCOVE_RELEASE_TAG }}"

      - name: Build release artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: ${{ matrix.build_command }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.artifact_name }}
          path: |
            dist/*.AppImage
            dist/*.blockmap
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.yml
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || inputs.dry_run != true }}

    steps:
      - name: Resolve release channel
        id: channel
        shell: bash
        run: |
          if [[ "${OPENCOVE_RELEASE_TAG}" == *"-nightly."* ]]; then
            echo "is_nightly=true" >> "$GITHUB_OUTPUT"
            echo "release_name=Nightly ${OPENCOVE_RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "is_nightly=false" >> "$GITHUB_OUTPUT"
            echo "release_name=${OPENCOVE_RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.OPENCOVE_RELEASE_TARGET }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Align package version with release tag
        run: node scripts/apply-ci-release-version.mjs "${{ env.OPENCOVE_RELEASE_TAG }}"

      - name: Generate release manifest
        run: node scripts/generate-release-manifest.mjs

      - name: Generate checksums
        run: node scripts/generate-checksums.mjs release-assets

      - name: Publish nightly prerelease
        if: steps.channel.outputs.is_nightly == 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.OPENCOVE_RELEASE_TAG }}
          target_commitish: ${{ env.OPENCOVE_RELEASE_TARGET }}
          name: ${{ steps.channel.outputs.release_name }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            release-assets/*
            release/release-manifest.json

      - name: Publish stable release
        if: steps.channel.outputs.is_nightly != 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.OPENCOVE_RELEASE_TAG }}
          target_commitish: ${{ env.OPENCOVE_RELEASE_TARGET }}
          name: ${{ steps.channel.outputs.release_name }}
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: |
            release-assets/*
            release/release-manifest.json
