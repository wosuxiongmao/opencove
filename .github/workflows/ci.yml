name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-ubuntu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret scan
        run: pnpm secrets:scan

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm check

      - name: Unit tests (PR)
        if: github.event_name == 'pull_request'
        run: pnpm test -- --run

      - name: Unit tests with coverage (main)
        if: github.event_name == 'push'
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Upload coverage artifact
        if: github.event_name == 'push' && always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-ubuntu:
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: E2E tests (shard)
        timeout-minutes: 30
        env:
          OPENCOVE_E2E_SKIP_BUILD: '1'
          OPENCOVE_E2E_WINDOW_MODE: inactive
        run: xvfb-run -a pnpm test:e2e -- --shard=${{ matrix.shard }}/3 --max-failures=2

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts-ubuntu-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Cleanup E2E temp dirs
        if: always()
        run: |
          if [ -n "${RUNNER_TEMP:-}" ]; then rm -rf "${RUNNER_TEMP}/opencove-e2e" || true; fi
          rm -rf "/tmp/opencove-e2e" || true
          rm -rf "/tmp/cove-e2e-user-data-"* || true

  ci-macos:
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: E2E tests (shard)
        timeout-minutes: 30
        env:
          OPENCOVE_E2E_SKIP_BUILD: '1'
          OPENCOVE_E2E_WINDOW_MODE: inactive
        run: pnpm test:e2e -- --shard=${{ matrix.shard }}/3 --max-failures=2

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts-macos-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Cleanup E2E temp dirs
        if: always()
        run: |
          if [ -n "${RUNNER_TEMP:-}" ]; then rm -rf "${RUNNER_TEMP}/opencove-e2e" || true; fi
          rm -rf "/tmp/opencove-e2e" || true
          rm -rf "/tmp/cove-e2e-user-data-"* || true

  platform-e2e-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Windows-specific E2E tests
        env:
          OPENCOVE_E2E_SKIP_BUILD: '1'
          OPENCOVE_E2E_TEST_MATCH: '**/*.windows.spec.ts'
          OPENCOVE_E2E_WINDOW_MODE: inactive
        run: pnpm exec playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-windows-platform-e2e
          path: test-results/
          retention-days: 7
